<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>FioPulse · Modal disciplinar minimalista (mock)</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../public/styles.css">
<style>
  body{background:#cfd8cc;margin:0;padding:26px;min-height:100vh}
  .cap{max-width:760px;margin:0 auto 16px;font-size:13px;color:#3a4a36;background:#fff;border:1px dashed #cdd8c8;border-radius:12px;padding:11px 15px;line-height:1.6}
  /* AJUSTES propostos (entram no styles.css quando aprovado) */
  #disc-form{display:flex;flex-direction:column;gap:20px;padding:22px 24px 24px}
  #disc-form .field{margin:0}
  #disc-form .field>label{margin-bottom:7px}
  #disc-form .disc-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
  /* documento = botao minimalista (alinha com Data/Motivo) */
  #disc-form .disc-upbtn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;height:44px;border:1px solid var(--border);border-radius:11px;background:var(--surface);color:var(--text-body);font:inherit;font-size:13.5px;font-weight:500;cursor:pointer;transition:border-color .15s,background .15s}
  #disc-form .disc-upbtn:hover{border-color:var(--plum);background:var(--surface-warm)}
  #disc-form .disc-upbtn .icon{width:17px;height:17px;color:var(--plum)}
  @media(max-width:680px){#disc-form .disc-row3{grid-template-columns:1fr}}
</style></head>
<body>
<div class="cap"><b>Mock · modal disciplinar minimalista.</b> Sem nota de acesso e sem texto explicativo. Documento vira um botão. Tudo cabe em: Funcionário, Tipo, [Data · Motivo · Documento] e Descrição.</div>

<div class="modal modal--wide" style="margin:0 auto">
  <div class="modal__header">
    <div><h2>Registrar ocorrência disciplinar</h2><p>Dado sensível. Fica registrado quem aplicou, data e hora.</p></div>
    <button class="modal__close"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  </div>
  <form class="modal__body" id="disc-form">

    <div class="field">
      <label>Funcionário <span style="color:var(--danger)">*</span></label>
      <select><option>Selecione...</option></select>
    </div>

    <div class="field">
      <label>Tipo <span style="color:var(--danger)">*</span></label>
      <div class="com-seg disc-seg">
        <button type="button" class="com-seg__chip is-on"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg><span>Verbal</span></button>
        <button type="button" class="com-seg__chip"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg><span>Escrita</span></button>
        <button type="button" class="com-seg__chip"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span>Suspensão</span></button>
      </div>
    </div>

    <div class="disc-row3">
      <div class="field"><label>Data <span style="color:var(--danger)">*</span></label><input type="date" value="2026-06-30"></div>
      <div class="field"><label>Motivo <span style="color:var(--danger)">*</span></label><select><option>Faltas injustificadas</option></select></div>
      <div class="field">
        <label>Documento anexado <span style="color:var(--danger)">*</span></label>
        <button type="button" class="disc-upbtn"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg><span>Escolher arquivo</span></button>
      </div>
    </div>

    <div class="field">
      <label>Descrição</label>
      <textarea rows="4" placeholder="Detalhe o ocorrido (datas, contexto)..."></textarea>
    </div>
  </form>
  <div class="modal__footer">
    <button class="btn btn--ghost">Cancelar</button>
    <button class="btn btn--primary"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg><span>Registrar ocorrência</span></button>
  </div>
</div>
</body></html>
