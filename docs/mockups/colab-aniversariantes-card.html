<!doctype html>
<html lang="pt-BR" class="modo-colab cp-dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FioPulse · Aniversariantes na home do colaborador</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="file:///C:/projetos/ocorr-ponto/public/styles.css">
<link rel="stylesheet" href="file:///C:/projetos/ocorr-ponto/public/portal-colaborador.css">
<style>
  body{ background:#0E130E; margin:0; padding:22px 16px 40px; font-family:Poppins,sans-serif; }
  .phone{ max-width:390px; margin:0 auto; }
  .ctx{ font-size:11px; color:#5b6b5f; text-transform:uppercase; letter-spacing:.06em; margin:0 0 14px; text-align:center; }
  /* destaque "você": avatar verde + sufixo */
  .cp-aniv__av.is-me{ background:linear-gradient(150deg,#1AA34F,#0B7A36); color:#fff; }
  .me{ color:var(--plum, #b07cc6); font-weight:700; }
</style>
</head>
<body>
<div class="phone">
  <p class="ctx">Home do colaborador — bloco novo</p>

  <div class="cp-seclabel">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-8H4v8M4 16s.5-1 2-1 2.5 1 4 1 2.5-1 4-1 2.5 1 4 1 2-1 2-1M12 4a1 1 0 0 0-1 1c0 1 1 2 1 2s1-1 1-2a1 1 0 0 0-1-1zM6 13v-2a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v2"/></svg>
    <span>Aniversariantes do mês</span>
  </div>

  <div class="cp-aniv">
    <div class="cp-aniv__row">
      <div class="cp-aniv__av is-me">WS</div>
      <span class="cp-aniv__nome">William Schulz <span class="me">· você</span></span>
      <span class="cp-aniv__data">14/06</span>
    </div>
    <div class="cp-aniv__row">
      <div class="cp-aniv__av">MA</div>
      <span class="cp-aniv__nome">Marina Alves</span>
      <span class="cp-aniv__hoje">Hoje</span>
    </div>
    <div class="cp-aniv__row">
      <div class="cp-aniv__av">JB</div>
      <span class="cp-aniv__nome">João Batista de Souza</span>
      <span class="cp-aniv__data">22/06</span>
    </div>
    <div class="cp-aniv__row">
      <div class="cp-aniv__av">RC</div>
      <span class="cp-aniv__nome">Rafael Costa</span>
      <span class="cp-aniv__data">29/06</span>
    </div>
  </div>
</div>
</body>
</html>
