<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mockup · Splash self-drawing (FioPulse)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Michroma&family=Poppins:wght@400;500;600&display=swap" />
<style>
  /* ============================================================
     CONSTANTES — ajuste aqui velocidade, cor, tamanho e fundo.
     ============================================================ */
  :root {
    --logo-size: 220px;                       /* tamanho do emblema */
    --draw-dur: 2.1s;                         /* velocidade do traço */
    --draw-ease: cubic-bezier(.65, 0, .35, 1);/* curva do traço */
    --stroke-w: 2.6;                          /* espessura do traço (unidades da viewBox) */
    --fill-dur: 0.7s;                         /* fade do preenchimento */
    --fill-start: 0.82;                       /* fração do traço em que o fill começa */
    --word-delay: 2.45s;                      /* entrada do wordmark */

    --azul: #0076BE; --verde: #008835; --amarelo: #FFCB00;
    --bg-0: #0A1A12;                          /* fundo (verde quase preto) */
    --bg-1: #06120C;
    --halo: rgba(0, 136, 53, .42);            /* cor do halo atrás da logo */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: "Poppins", system-ui, sans-serif;
    background: #03251a;
    display: grid; place-items: center;
    min-height: 100vh;
  }

  /* ---- Splash ---- */
  .splash {
    position: relative;
    width: min(440px, 92vw); height: min(560px, 86vh);
    border-radius: 26px; overflow: hidden;
    background: radial-gradient(120% 90% at 50% 38%, var(--bg-0) 0%, var(--bg-1) 70%);
    display: grid; place-items: center;
    box-shadow: 0 30px 90px rgba(0, 0, 0, .5);
  }
  /* halo radial suave atrás da logo */
  .splash::before {
    content: ""; position: absolute; left: 50%; top: 42%;
    width: 360px; height: 360px; transform: translate(-50%, -50%);
    background: radial-gradient(circle, var(--halo) 0%, transparent 62%);
    filter: blur(6px); opacity: 0; animation: halo 2.4s ease-out .3s forwards;
  }
  /* starfield/partículas sutis (one-shot, barato) */
  .stars { position: absolute; inset: 0; pointer-events: none; }
  .stars i {
    position: absolute; width: 2px; height: 2px; border-radius: 50%;
    background: #cfe9d8; opacity: 0; animation: twinkle 3s ease-in-out infinite;
  }

  .stage { position: relative; z-index: 2; display: grid; justify-items: center; gap: 18px; }

  .logo { width: var(--logo-size); height: auto; overflow: visible; display: block; }

  /* PREENCHIMENTO: começa invisível, entra após ~82% do traço. */
  .fill {
    opacity: 0;
    animation: fillin var(--fill-dur) ease forwards;
    animation-delay: calc(var(--delay, 0s) + var(--draw-dur) * var(--fill-start));
  }
  /* TRAÇO por cima: line-draw via stroke-dashoffset (pathLength normalizado=1). */
  .stroke {
    stroke-width: var(--stroke-w);
    stroke-linecap: round; stroke-linejoin: round;
    stroke-dasharray: 1; stroke-dashoffset: 1;
    animation: draw var(--draw-dur) var(--draw-ease) forwards;
    animation-delay: var(--delay, 0s);
  }
  @keyframes draw { to { stroke-dashoffset: 0; } }
  @keyframes fillin { to { opacity: 1; } }

  /* Wordmark + sub + versão entram depois do preenchimento. */
  .word {
    font-family: "Michroma", "Poppins", sans-serif;
    font-size: 30px; letter-spacing: .01em; color: #fff;
    opacity: 0; animation: rise .7s var(--draw-ease) var(--word-delay) forwards;
  }
  .word b { color: var(--amarelo); font-weight: 400; }
  .sub {
    font-size: 11.5px; color: #9fc7ad; letter-spacing: .04em; margin-top: -8px;
    opacity: 0; animation: rise .7s var(--draw-ease) calc(var(--word-delay) + .12s) forwards;
  }
  .ver {
    font-size: 10.5px; color: #5f8a6e; letter-spacing: .12em; text-transform: uppercase;
    opacity: 0; animation: rise .7s ease calc(var(--word-delay) + .24s) forwards;
  }
  @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  @keyframes halo { to { opacity: 1; } }
  @keyframes twinkle { 0%, 100% { opacity: 0; } 50% { opacity: .8; } }

  /* Acessibilidade: sem animação → mostra logo pronta. */
  @media (prefers-reduced-motion: reduce) {
    .fill, .word, .sub, .ver { opacity: 1; animation: none; }
    .stroke { stroke-dashoffset: 0; animation: none; }
    .splash::before { opacity: 1; animation: none; }
  }

  /* ---- controles só do mock (não vão pro app) ---- */
  .panel { margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  .panel button, .panel label {
    font-family: inherit; font-size: 12.5px; color: #d8e8dd; background: #0e2c1e;
    border: 1px solid #1d4a33; border-radius: 9px; padding: 8px 13px; cursor: pointer;
    display: inline-flex; align-items: center; gap: 7px;
  }
  .panel input[type="range"] { accent-color: var(--verde); }
  .note { margin: 16px auto 0; max-width: 440px; text-align: center; font-size: 12px; color: #9fb6a6; line-height: 1.6; }
  .note code { background: #0e2c1e; padding: 1px 6px; border-radius: 5px; color: #cfe9d8; }
</style>
</head>

    <button id="replay">↻ Repetir</button>
    <label>Traço <input type="range" id="spd" min="0.8" max="4" step="0.1" value="2.1" /></label>
    <button id="bg">Fundo claro/escuro</button>
  </div>
  <p class="note">Mock do splash. Ajustáveis por constante no <code>:root</code>: <code>--logo-size</code>, <code>--draw-dur</code>, <code>--stroke-w</code>, cores, <code>--bg</code>, <code>--halo</code>. A animação é one-shot e some sozinha por timer no app.</p>

<script>
  // ---- starfield (partículas) ----
  const stars = document.getElementById("stars");
  for (let i = 0; i < 22; i++) {
    const s = document.createElement("i");
    s.style.left = (8 + (i * 37) % 84) + "%";
    s.style.top = (10 + (i * 53) % 80) + "%";
    s.style.animationDelay = (i % 7) * 0.4 + "s";
    stars.appendChild(s);
  }
  // ---- replay (re-dispara animações trocando a classe) ----
  const splash = document.getElementById("splash");
  document.getElementById("replay").onclick = () => {
    const clone = splash.cloneNode(true);
    splash.parentNode.replaceChild(clone, splash);
    location.reload();
  };
  document.getElementById("spd").oninput = (e) => {
    document.documentElement.style.setProperty("--draw-dur", e.target.value + "s");
    document.documentElement.style.setProperty("--word-delay", (parseFloat(e.target.value) + 0.35) + "s");
    location.hash = "spd" + e.target.value;
  };
  let claro = false;
  document.getElementById("bg").onclick = () => {
    claro = !claro;
    const r = document.documentElement.style;
    if (claro) { r.setProperty("--bg-0", "#F2F7F0"); r.setProperty("--bg-1", "#E3EEE0"); r.setProperty("--halo", "rgba(0,136,53,.18)"); document.querySelectorAll(".word").forEach(w=>w.style.color="#10301f"); }
    else { r.setProperty("--bg-0", "#0A1A12"); r.setProperty("--bg-1", "#06120C"); r.setProperty("--halo", "rgba(0,136,53,.42)"); document.querySelectorAll(".word").forEach(w=>w.style.color="#fff"); }
  };
</script>
