<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Roadmap Brain · FioPulse</title>
<style>
@font-face{font-family:"Poppins";font-weight:400;font-display:swap;src:url("/fonts/poppins-400-latin.woff2") format("woff2")}
@font-face{font-family:"Poppins";font-weight:500;font-display:swap;src:url("/fonts/poppins-500-latin.woff2") format("woff2")}
@font-face{font-family:"Poppins";font-weight:600;font-display:swap;src:url("/fonts/poppins-600-latin.woff2") format("woff2")}
@font-face{font-family:"Poppins";font-weight:700;font-display:swap;src:url("/fonts/poppins-700-latin.woff2") format("woff2")}
@font-face{font-family:"Michroma";font-weight:400;font-display:swap;src:url("/fonts/michroma-400-latin.woff2") format("woff2")}

*{box-sizing:border-box;margin:0;padding:0}

:root{
  --milk:#F6F8F4; --milk-warm:#EEF3EC; --surface:#FFFFFF; --panel:#FFFFFF;
  --border:#E7EDE4; --border-strong:#D8E2D3;
  --text:#132110; --text-body:#26361F; --text-muted:#5A6E52; --text-faint:#84967F;
  --plum:#008835; --plum-soft:#1AA34F; --plum-deep:#006328; --yellow:#FFCB00; --blue:#0076BE;
  --stage:radial-gradient(120% 100% at 50% 0%, #EFF5EC 0%, #E7EEE3 52%, #DEE7D9 100%);
  --link:#C4D3BC; --link-strong:#9CBE9C;
  --sh1:0 1px 2px rgba(20,40,25,.06);
  --sh2:0 10px 28px -14px rgba(20,40,25,.20);
  --sh3:0 22px 54px -26px rgba(6,40,20,.42);

  --noar-d:#12A150; --noar-b:#E6F1E5; --noar-bd:#BFDCC0; --noar-t:#0C6A32;
  --cheg-d:#E0A32E; --cheg-b:#FBF1DA; --cheg-bd:#EAD6A6; --cheg-t:#8A5B12;
  --apr-d:#0E7FC1; --apr-b:#E3EFF8; --apr-bd:#BBD9EE; --apr-t:#0A5A8C;
  --plan-d:#8A9A84; --plan-b:#EEF2EC; --plan-bd:#D8E2D3; --plan-t:#566B50;
  --desc-d:#B79A93; --desc-b:#F2ECEA; --desc-bd:#E2D6D2; --desc-t:#8A6C64;
}
[data-theme="dark"]{
  --milk:#0E130E; --milk-warm:#161D15; --surface:#161D15; --panel:#171F16;
  --border:#232C22; --border-strong:#2E382C;
  --text:#F2F7EF; --text-body:#E4ECE0; --text-muted:#94A88C; --text-faint:#71835F;
  --plum:#5FCB85; --plum-soft:#7BD79A; --plum-deep:#3FB570; --yellow:#FFD84D; --blue:#67B7E8;
  --stage:radial-gradient(120% 100% at 50% -6%, #12180F 0%, #0C110B 58%, #080C08 100%);
  --link:#28331F; --link-strong:#3C5236;
  --sh1:0 1px 2px rgba(0,0,0,.5);
  --sh2:0 12px 30px -14px rgba(0,0,0,.7);
  --sh3:0 24px 60px -22px rgba(0,0,0,.8);

  --noar-d:#5FCB85; --noar-b:#16271A; --noar-bd:#2E5A3B; --noar-t:#BFE6C9;
  --cheg-d:#E8C06B; --cheg-b:#2A230F; --cheg-bd:#5A4A20; --cheg-t:#F0D89A;
  --apr-d:#67B7E8; --apr-b:#10222E; --apr-bd:#24506E; --apr-t:#AFD9F2;
  --plan-d:#8EA085; --plan-b:#1A2118; --plan-bd:#2E382C; --plan-t:#AEBFA6;
  --desc-d:#9A8078; --desc-b:#241C1A; --desc-bd:#3A2E2A; --desc-t:#BFA79F;
}

html,body{height:100%}
body{
  font-family:"Poppins",system-ui,-apple-system,sans-serif;
  color:var(--text-body); background:var(--milk);
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  overflow:hidden;
}
.app{display:flex;flex-direction:column;height:100dvh;width:100vw}

/* ============ TOPBAR ============ */
.top{
  position:relative;z-index:20;flex:0 0 auto;
  display:flex;align-items:center;gap:16px;flex-wrap:wrap;
  padding:14px clamp(14px,3vw,26px);
  background:color-mix(in srgb,var(--surface) 90%,transparent);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
}
.brand{display:flex;align-items:center;gap:12px;min-width:0;margin-right:auto}
.brand-orb{
  width:42px;height:42px;border-radius:13px;flex:0 0 auto;position:relative;
  background:radial-gradient(120% 120% at 30% 22%,var(--plum-soft),var(--plum-deep));
  display:grid;place-items:center;color:#fff;
  box-shadow:0 8px 20px -8px rgba(0,120,55,.55),0 0 0 1px rgba(120,215,154,.25) inset;
}
.brand-orb svg{width:24px;height:24px}
.brand-txt h1{font-size:clamp(15px,3.4vw,18px);font-weight:700;letter-spacing:-.02em;color:var(--text);line-height:1.1}
.brand-txt p{font-size:11.5px;color:var(--text-muted);font-weight:500;margin-top:2px}
.launch{
  display:inline-flex;align-items:center;gap:8px;flex:0 0 auto;
  padding:8px 13px;border-radius:11px;font-size:12px;font-weight:600;
  background:linear-gradient(135deg,color-mix(in srgb,var(--yellow) 22%,var(--surface)),var(--surface));
  border:1px solid color-mix(in srgb,var(--yellow) 45%,var(--border));
  color:var(--text);white-space:nowrap;box-shadow:var(--sh1);
}
.launch .flame{width:16px;height:16px;color:var(--yellow);filter:drop-shadow(0 1px 2px rgba(180,120,0,.4))}
.launch b{color:var(--plum)}
.tbtn{
  flex:0 0 auto;display:inline-flex;align-items:center;gap:7px;height:40px;padding:0 13px;
  border-radius:11px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;
  background:var(--surface);border:1px solid var(--border-strong);color:var(--text-muted);
  transition:.16s;white-space:nowrap;
}
.tbtn:hover{color:var(--plum);border-color:var(--plum);transform:translateY(-1px)}
.tbtn svg{width:17px;height:17px}
@media(max-width:560px){.launch span.lg{display:none}.tbtn span{display:none}.tbtn{padding:0;width:40px;justify-content:center}}

/* ============ RIBBON (counters + search) ============ */
.ribbon{
  position:relative;z-index:15;flex:0 0 auto;
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;
  padding:11px clamp(14px,3vw,26px);
  background:var(--surface);border-bottom:1px solid var(--border);
}
.counts{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.chip{
  display:inline-flex;align-items:center;gap:8px;cursor:pointer;user-select:none;
  padding:7px 12px;border-radius:11px;font-size:12px;font-weight:600;
  background:var(--milk-warm);border:1px solid transparent;color:var(--text-body);transition:.15s;
}
.chip:hover{border-color:var(--border-strong)}
.chip .dot{width:10px;height:10px;border-radius:50%;flex:0 0 auto}
.chip .n{font-weight:700;font-variant-numeric:tabular-nums}
.chip.on{background:var(--surface);box-shadow:var(--sh1)}
.chip[data-st="noar"].on{border-color:var(--noar-d)}
.chip[data-st="cheg"].on{border-color:var(--cheg-d)}
.chip[data-st="apr"].on{border-color:var(--apr-d)}
.chip[data-st="plan"].on{border-color:var(--plan-d)}
.chip[data-st="desc"].on{border-color:var(--desc-d)}
.chip.total{background:transparent;border:1px dashed var(--border-strong);color:var(--text-muted)}
.chip.total .n{color:var(--plum);font-size:14px}
.grow{flex:1 1 40px}
.search{position:relative;flex:0 0 auto}
.search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--text-faint);pointer-events:none}
.search input{
  width:clamp(160px,26vw,240px);height:38px;border-radius:11px;padding:0 32px 0 34px;
  font-family:inherit;font-size:13px;color:var(--text);
  background:var(--milk-warm);border:1px solid var(--border);outline:none;transition:.15s;
}
.search input:focus{border-color:var(--plum);background:var(--surface)}
.search .clr{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:22px;height:22px;border:none;border-radius:7px;background:transparent;color:var(--text-faint);cursor:pointer;display:none;place-items:center}
.search .clr svg{position:static;transform:none;width:14px;height:14px}
.search.has .clr{display:grid}

/* ============ STAGE ============ */
.stage{
  position:relative;flex:1 1 auto;overflow:hidden;cursor:grab;
  background:var(--stage);touch-action:none;
}
.stage.grabbing{cursor:grabbing}
.world{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform}
.links{position:absolute;top:0;left:0;overflow:visible;pointer-events:none}
.links path{fill:none;stroke:var(--link);stroke-width:2.2;transition:opacity .35s ease, stroke .3s}
.links path.area-link{stroke:var(--link-strong);stroke-width:2.8}
.links path.hid{opacity:0}
.links path.dim{opacity:.16}

/* nodes */
.node{position:absolute;transform:translate(-50%,-50%);transition:opacity .32s ease, filter .3s}
.node.dim{opacity:.16;filter:saturate(.5)}
.node.hard-hide{opacity:0;pointer-events:none}

/* center */
.core{z-index:6}
.core .orb{
  width:132px;height:132px;border-radius:50%;position:relative;display:grid;place-items:center;
  background:radial-gradient(120% 120% at 32% 24%,var(--plum-soft),var(--plum-deep));
  color:#fff;box-shadow:0 0 0 10px color-mix(in srgb,var(--plum) 10%,transparent),0 26px 60px -18px rgba(0,120,55,.6),0 0 0 1px rgba(120,215,154,.3) inset;
  cursor:pointer;
}
.core .orb::after{content:"";position:absolute;inset:-14px;border-radius:50%;border:1.5px solid color-mix(in srgb,var(--plum) 42%,transparent);animation:halo 3.6s ease-in-out infinite}
@keyframes halo{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:.05;transform:scale(1.12)}}
.core .mark{font-family:"Michroma",sans-serif;font-size:15px;letter-spacing:.02em;line-height:1;margin-top:8px}
.core .pulse{width:62px;height:22px}
.core .pulse path{fill:none;stroke:#fff;stroke-width:3.4;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 1px 3px rgba(0,60,25,.5))}
.core .cap{
  position:absolute;left:50%;top:calc(100% + 12px);transform:translateX(-50%);
  display:inline-flex;align-items:center;gap:7px;white-space:nowrap;
  padding:7px 13px;border-radius:11px;font-size:11.5px;font-weight:600;
  background:var(--surface);border:1px solid color-mix(in srgb,var(--yellow) 45%,var(--border));color:var(--text);box-shadow:var(--sh2);
}
.core .cap .dot{width:8px;height:8px;border-radius:50%;background:var(--yellow);box-shadow:0 0 0 3px color-mix(in srgb,var(--yellow) 25%,transparent)}

/* area node */
.area{z-index:5;cursor:pointer}
.area-inner{
  display:flex;align-items:center;gap:11px;padding:11px 15px 11px 12px;border-radius:16px;
  background:var(--surface);border:1px solid var(--border-strong);box-shadow:var(--sh2);
  transition:transform .16s, box-shadow .16s, border-color .16s;min-width:150px;
}
.area:hover .area-inner{transform:translateY(-2px);box-shadow:var(--sh3);border-color:var(--plum)}
.area-ic{
  width:38px;height:38px;border-radius:12px;flex:0 0 auto;display:grid;place-items:center;color:#fff;
  background:linear-gradient(145deg,var(--a1),var(--a2));box-shadow:0 6px 16px -6px var(--a2);
}
.area-ic svg{width:21px;height:21px}
.area-tx b{display:block;font-size:13.5px;font-weight:700;letter-spacing:-.01em;color:var(--text);line-height:1.12}
.area-tx span{font-size:11px;color:var(--text-muted);font-weight:500;display:flex;align-items:center;gap:5px;margin-top:3px}
.area-tx .mini{display:inline-flex;gap:3px}
.area-tx .mini i{width:7px;height:7px;border-radius:50%;display:inline-block}
.area .chev{margin-left:2px;color:var(--text-faint);display:grid;place-items:center;transition:transform .28s}
.area .chev svg{width:16px;height:16px}
.area.open .chev{transform:rotate(180deg)}

/* leaf (feature) node */
.leaf{z-index:4}
.leaf-inner{
  --d:var(--plan-d);--b:var(--plan-b);--bd:var(--plan-bd);--t:var(--plan-t);
  display:flex;align-items:center;gap:9px;width:max-content;max-width:184px;
  padding:9px 12px;border-radius:13px;cursor:pointer;
  background:var(--surface);border:1px solid var(--border);box-shadow:var(--sh1);
  transition:transform .16s, box-shadow .16s, border-color .16s, opacity .3s;
  transform-origin:center;
}
.leaf-inner:hover{transform:translateY(-2px) scale(1.02);box-shadow:var(--sh2);border-color:var(--d)}
.leaf.sel .leaf-inner{border-color:var(--d);box-shadow:0 0 0 3px color-mix(in srgb,var(--d) 24%,transparent),var(--sh2)}
.leaf .sd{width:11px;height:11px;border-radius:50%;flex:0 0 auto;background:var(--d);box-shadow:0 0 0 3px var(--b)}
.leaf .lt{font-size:12.5px;font-weight:600;color:var(--text);line-height:1.2;letter-spacing:-.01em}
.leaf.st-desc .lt{text-decoration:line-through;text-decoration-color:color-mix(in srgb,var(--d) 60%,transparent);color:var(--text-muted)}
.st-noar .leaf-inner{--d:var(--noar-d);--b:var(--noar-b);--bd:var(--noar-bd);--t:var(--noar-t)}
.st-cheg .leaf-inner{--d:var(--cheg-d);--b:var(--cheg-b);--bd:var(--cheg-bd);--t:var(--cheg-t)}
.st-apr  .leaf-inner{--d:var(--apr-d); --b:var(--apr-b); --bd:var(--apr-bd); --t:var(--apr-t)}
.st-plan .leaf-inner{--d:var(--plan-d);--b:var(--plan-b);--bd:var(--plan-bd);--t:var(--plan-t)}
.st-desc .leaf-inner{--d:var(--desc-d);--b:var(--desc-b);--bd:var(--desc-bd);--t:var(--desc-t);border-style:dashed}
/* collapsed leaves fold into the area */
.leaf.folded{opacity:0;pointer-events:none}
.leaf.folded .leaf-inner{transform:scale(.35)}

/* ============ CONTROLS (floating) ============ */
.dock{
  position:absolute;right:16px;bottom:16px;z-index:16;display:flex;flex-direction:column;gap:8px;
}
.dock button{
  width:42px;height:42px;border-radius:12px;border:1px solid var(--border-strong);
  background:color-mix(in srgb,var(--surface) 92%,transparent);backdrop-filter:blur(8px);
  color:var(--text-muted);cursor:pointer;display:grid;place-items:center;box-shadow:var(--sh1);transition:.15s;
}
.dock button:hover{color:var(--plum);border-color:var(--plum);transform:translateY(-1px)}
.dock button svg{width:19px;height:19px}
.dock .grp{display:flex;flex-direction:column;border-radius:12px;overflow:hidden;box-shadow:var(--sh1)}
.dock .grp button{border-radius:0;box-shadow:none;border-bottom:none}
.dock .grp button:last-child{border-bottom:1px solid var(--border-strong)}

.expand-all{
  position:absolute;left:16px;bottom:16px;z-index:16;
  display:inline-flex;align-items:center;gap:8px;padding:9px 14px;border-radius:12px;
  font-family:inherit;font-size:12.5px;font-weight:600;cursor:pointer;
  background:color-mix(in srgb,var(--surface) 92%,transparent);backdrop-filter:blur(8px);
  border:1px solid var(--border-strong);color:var(--text-muted);box-shadow:var(--sh1);transition:.15s;
}
.expand-all:hover{color:var(--plum);border-color:var(--plum)}
.expand-all svg{width:16px;height:16px}

.legend{
  position:absolute;left:16px;top:16px;z-index:14;
  display:flex;gap:9px;flex-wrap:wrap;max-width:min(70vw,560px);
  padding:9px 12px;border-radius:12px;
  background:color-mix(in srgb,var(--surface) 88%,transparent);backdrop-filter:blur(8px);
  border:1px solid var(--border);box-shadow:var(--sh1);font-size:11px;color:var(--text-muted);font-weight:500;
}
.legend span{display:inline-flex;align-items:center;gap:6px}
.legend i{width:11px;height:11px;border-radius:50%;flex:0 0 auto}
.hint{
  position:absolute;left:50%;bottom:14px;transform:translateX(-50%);z-index:12;
  font-size:11.5px;color:var(--text-faint);font-weight:500;pointer-events:none;
  background:color-mix(in srgb,var(--surface) 70%,transparent);padding:5px 12px;border-radius:9px;
  opacity:1;transition:opacity .5s;
}
.hint.gone{opacity:0}

/* ============ DETAIL DRAWER ============ */
.drawer{
  position:absolute;top:0;right:0;height:100%;width:min(380px,90vw);z-index:30;
  background:var(--panel);border-left:1px solid var(--border);box-shadow:var(--sh3);
  transform:translateX(102%);transition:transform .34s cubic-bezier(.22,1,.36,1);
  display:flex;flex-direction:column;
}
.drawer.open{transform:none}
.dw-head{padding:20px 22px 14px;border-bottom:1px solid var(--border);position:relative}
.dw-close{position:absolute;right:16px;top:16px;width:32px;height:32px;border:none;border-radius:9px;background:var(--milk-warm);color:var(--text-muted);cursor:pointer;display:grid;place-items:center;transition:.15s}
.dw-close:hover{color:var(--text);background:var(--border)}
.dw-close svg{width:17px;height:17px}
.dw-crumb{display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:600;color:var(--text-muted);margin-bottom:12px}
.dw-crumb .aic{width:22px;height:22px;border-radius:7px;display:grid;place-items:center;color:#fff;background:linear-gradient(145deg,var(--a1),var(--a2))}
.dw-crumb .aic svg{width:13px;height:13px}
.dw-badge{
  display:inline-flex;align-items:center;gap:7px;padding:5px 11px;border-radius:9px;font-size:11.5px;font-weight:700;margin-bottom:12px;
  background:var(--b);border:1px solid var(--bd);color:var(--t);
}
.dw-badge .dot{width:9px;height:9px;border-radius:50%;background:var(--d)}
.dw-title{font-size:19px;font-weight:700;letter-spacing:-.02em;color:var(--text);line-height:1.2}
.dw-body{padding:18px 22px;overflow-y:auto;flex:1 1 auto}
.dw-desc{font-size:14px;line-height:1.62;color:var(--text-body)}
.dw-meta{margin-top:18px;display:flex;flex-wrap:wrap;gap:8px}
.dw-meta .m{display:inline-flex;align-items:center;gap:7px;padding:7px 11px;border-radius:10px;font-size:12px;font-weight:600;background:var(--milk-warm);color:var(--text-muted)}
.dw-meta .m b{color:var(--plum);font-weight:700}
.dw-meta .m svg{width:14px;height:14px;color:var(--text-faint)}
.dw-foot{padding:14px 22px;border-top:1px solid var(--border);font-size:11.5px;color:var(--text-faint)}
.scrim{position:absolute;inset:0;z-index:25;background:rgba(10,20,12,.28);opacity:0;pointer-events:none;transition:opacity .3s}
.scrim.on{opacity:1;pointer-events:auto}
[data-theme="dark"] .scrim{background:rgba(0,0,0,.5)}

@media(max-width:640px){
  .legend{display:none}
  .drawer{width:100vw;border-left:none;transform:translateY(102%)}
  .drawer.open{transform:none}
}
@media(prefers-reduced-motion:reduce){
  .core .orb::after{animation:none}
  *{transition-duration:.01ms !important}
}
</style>
</head>
<body>
<div class="app" id="app">
  <header class="top">
    <div class="brand">
      <div class="brand-orb" id="brandOrb" title="FioPulse">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h4l2.5-7 4 15 3-9 2 4h4.5"/></svg>
      </div>
      <div class="brand-txt">
        <h1>Roadmap Brain</h1>
        <p>O cerebro do FioPulse, o que ja esta no ar e o que vem</p>
      </div>
    </div>
    <div class="launch" title="Lancamento oficial">
      <svg class="flame" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2c1 3-1 4-1 6 0 1 1 2 1 2s2-1 2-3c2 2 3 4 3 7a5 5 0 0 1-10 0c0-3 2-5 3-6 1-1 2-2 2-3Z"/></svg>
      <span class="lg">Lancamento oficial</span>&nbsp;<b>segunda 27/07</b>
    </div>
    <button class="tbtn" id="themeBtn">
      <svg id="themeIc" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      <span>Tema</span>
    </button>
  </header>

  <div class="ribbon">
    <div class="counts" id="counts">
      <div class="chip total"><span class="n" id="cTot">0</span><span>recursos</span></div>
      <div class="chip on" data-st="noar"><i class="dot" style="background:var(--noar-d)"></i>No ar<span class="n" id="cNoar">0</span></div>

/* ============================================================
   LAYOUT radial
   ============================================================ */
const CX = 1400, CY = 1300;       // centro do mundo
const RA = 312;                   // raio dos nos de area
const RING_R = [610, 810, 1010, 1210]; // raios dos aneis de folhas
const SECTOR = 38;                // abertura angular de cada ramo (ramos a 45 graus)
const rad = (deg)=>deg*Math.PI/180;

const world = document.getElementById('world');
const links = document.getElementById('links');
let nodes = [];   // {el, x, y, area, leaf, st}
let areaEls = [];

function buildLayout(){
  // centro
  const core = document.createElement('div');
  core.className='node core';
  core.style.left=CX+'px'; core.style.top=CY+'px';
  core.innerHTML =
    '<div class="orb" id="coreOrb">'+
      '<svg class="pulse" viewBox="0 0 62 22"><path d="M2 11h11l4-8 6 17 4-13 3 6 3-2h24"/></svg>'+
      '<div class="mark">FioPulse</div>'+
    '</div>'+
    '<div class="cap"><span class="dot"></span>Estreia segunda 27/07</div>';
  world.appendChild(core);
  core.querySelector('#coreOrb').addEventListener('click',(e)=>{
    e.stopPropagation();
    const anyOpen=AREAS.some(a=>a._open);
    AREAS.forEach(a=>setArea(a,!anyOpen)); syncExpandBtn(); setTimeout(fit,60); dismissHint();
  });

  AREAS.forEach((area,ai)=>{
    area.ang = -90 + ai*(360/AREAS.length);
    const ax = CX + RA*Math.cos(rad(area.ang));
    const ay = CY + RA*Math.sin(rad(area.ang));
    area._x=ax; area._y=ay;

    // link centro -> area
    const cl = document.createElementNS('http://www.w3.org/2000/svg','path');
    cl.setAttribute('class','area-link');
    const mx=(CX+ax)/2, my=(CY+ay)/2;
    cl.setAttribute('d',`M${CX},${CY} Q${mx},${my} ${ax},${ay}`);
    links.appendChild(cl);
    area._clink=cl;

    // no de area
    const el = document.createElement('div');
    el.className='node area'+(area.muted?' muted':'');
    el.style.left=ax+'px'; el.style.top=ay+'px';
    el.style.setProperty('--a1',area.a1); el.style.setProperty('--a2',area.a2);
    const mini = area.children.slice(0,6).map(c=>`<i style="background:var(--${c.st}-d)"></i>`).join('');
    el.innerHTML =
      '<div class="area-inner">'+
        '<div class="area-ic">'+svgIc(area.ic)+'</div>'+
        '<div class="area-tx"><b>'+area.label+'</b>'+
          '<span><span class="cnt">'+area.children.length+'</span> recursos <span class="mini">'+mini+'</span></span>'+
        '</div>'+
        '<span class="chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg></span>'+
      '</div>';
    world.appendChild(el);
    area._el=el; areaEls.push(area);

    // folhas: aneis com no maximo 3 por anel, dentro do setor do ramo
    const ck = area.children.length;
    const ringCount = Math.min(RING_R.length, Math.ceil(ck/3));
    const perRing = Math.ceil(ck/ringCount);
    area._leaves=[];
    area.children.forEach((c,i)=>{
      const ring = Math.floor(i/perRing);
      const inRing = i - ring*perRing;
      const members = Math.min(perRing, ck - ring*perRing);
      const Rc = RING_R[ring];
      let a;
      if(members===1){ a=area.ang; }
      else{
        const stagger = (ring%2)? 4 : 0;
        a = area.ang - SECTOR/2 + stagger + (SECTOR/(members-1))*inRing;
      }
      const lx = CX + Rc*Math.cos(rad(a));
      const ly = CY + Rc*Math.sin(rad(a));

      // link area -> folha
      const pl = document.createElementNS('http://www.w3.org/2000/svg','path');
      pl.setAttribute('class','leaf-link hid');
      const cmx = ax + (lx-ax)*0.42, cmy = ay + (ly-ay)*0.42 - 26;
      pl.setAttribute('d',`M${ax},${ay} Q${cmx},${cmy} ${lx},${ly}`);
      links.appendChild(pl);

      const lel = document.createElement('div');
      lel.className='node leaf folded st-'+c.st;
      lel.style.left=lx+'px'; lel.style.top=ly+'px';
      lel.innerHTML =
        '<div class="leaf-inner"><span class="sd"></span><span class="lt">'+c.t+'</span></div>';
      world.appendChild(lel);

      const rec = {el:lel, link:pl, area, child:c, st:c.st, x:lx, y:ly};
      lel.addEventListener('click',(e)=>{ e.stopPropagation(); openDetail(rec); });
      nodes.push(rec);
      area._leaves.push(rec);
    });

    el.addEventListener('click',(e)=>{ e.stopPropagation(); toggleArea(area); });
  });
}

/* ============================================================
   EXPANDIR / RECOLHER
   ============================================================ */
function setArea(area, open){
  area._open=open;
  area._el.classList.toggle('open',open);
  area._leaves.forEach((rec,idx)=>{
    if(open){
      rec.el.style.transitionDelay=(idx*26)+'ms';
      rec.link.style.transitionDelay=(idx*26)+'ms';
      rec.el.classList.remove('folded');
      rec.link.classList.remove('hid');
    }else{
      rec.el.style.transitionDelay='0ms';
      rec.link.style.transitionDelay='0ms';
      rec.el.classList.add('folded');
      rec.link.classList.add('hid');
    }
  });
  applyFilter();
}
function toggleArea(area){ setArea(area, !area._open); dismissHint(); syncExpandBtn(); }
function syncExpandBtn(){
  const allOpen = AREAS.every(a=>a._open);
  document.getElementById('expandAllTx').textContent = allOpen ? 'Recolher tudo' : 'Expandir tudo';
}

/* ============================================================
   FILTRO (status + busca)
   ============================================================ */
let activeSt = new Set(['noar','cheg','apr','plan','desc']);
let query = '';
function norm(s){ return (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,''); }

function applyFilter(){
  const q = norm(query);
  nodes.forEach(rec=>{
    const stOn = activeSt.has(rec.st);
    const match = !q || norm(rec.child.t).includes(q) || norm(rec.child.d).includes(q) || norm(rec.area.label).includes(q);
    const visibleByArea = rec.area._open;
    // dim quando nao passa no filtro; hard-hide quando o ramo esta fechado (fica dobrado de qualquer forma)
    const pass = stOn && match;
    rec.el.classList.toggle('dim', !pass);
    if(visibleByArea){
      rec.link.classList.toggle('dim', !pass);
    }
  });
  // ramos: destacar so os que tem algum match quando ha busca/filtro
  const filtering = q || activeSt.size<5;
  AREAS.forEach(area=>{
    const any = area._leaves.some(r=> activeSt.has(r.st) && (!q || norm(r.child.t).includes(q)||norm(r.child.d).includes(q)||norm(area.label).includes(q)));
    area._el.classList.toggle('dim', filtering && !any);
    area._clink.classList.toggle('dim', filtering && !any);
  });
}

/* chips de status */
document.getElementById('counts').addEventListener('click',(e)=>{
  const chip = e.target.closest('.chip'); if(!chip) return;
  if(chip.classList.contains('total')){
    // reset: tudo ligado
    activeSt = new Set(['noar','cheg','apr','plan','desc']);
    document.querySelectorAll('.chip[data-st]').forEach(c=>c.classList.add('on'));
    applyFilter(); return;
  }
  const st = chip.dataset.st; if(!st) return;
  const onChips = document.querySelectorAll('.chip[data-st].on');
  const isSolo = onChips.length===1 && chip.classList.contains('on');
  if(isSolo){
    // ja isolado -> volta pra tudo
    activeSt = new Set(['noar','cheg','apr','plan','desc']);
    document.querySelectorAll('.chip[data-st]').forEach(c=>c.classList.add('on'));
  }else{
    // isola este status e abre todos os ramos p/ enxergar
    activeSt = new Set([st]);
    document.querySelectorAll('.chip[data-st]').forEach(c=>c.classList.toggle('on', c.dataset.st===st));
    AREAS.forEach(a=>setArea(a,true)); syncExpandBtn();
  }
  applyFilter();
});

/* busca */
const searchInput = document.getElementById('search');
const searchWrap = document.getElementById('searchWrap');
searchInput.addEventListener('input',()=>{
  query = searchInput.value.trim();
  searchWrap.classList.toggle('has', !!query);
  if(query){ AREAS.forEach(a=>setArea(a,true)); syncExpandBtn(); }
  applyFilter();
  dismissHint();
});
document.getElementById('searchClr').addEventListener('click',()=>{
  searchInput.value=''; query=''; searchWrap.classList.remove('has'); applyFilter(); searchInput.focus();
});

/* ============================================================
   DETALHE (drawer)
   ============================================================ */
const drawer=document.getElementById('drawer'), scrim=document.getElementById('scrim');
let selRec=null;
function openDetail(rec){
  if(selRec) selRec.el.classList.remove('sel');
  selRec=rec; rec.el.classList.add('sel');
  const c=rec.child, a=rec.area, st=ST[rec.st];
  document.getElementById('dwCrumb').innerHTML =
    '<span class="aic" style="--a1:'+a.a1+';--a2:'+a.a2+'">'+svgIc(a.ic)+'</span>'+a.label;
  const badge=document.getElementById('dwBadge');
  badge.style.setProperty('--d','var(--'+rec.st+'-d)');
  badge.style.setProperty('--b','var(--'+rec.st+'-b)');
  badge.style.setProperty('--bd','var(--'+rec.st+'-bd)');
  badge.style.setProperty('--t','var(--'+rec.st+'-t)');
  badge.innerHTML='<span class="dot"></span>'+st.lbl;
  document.getElementById('dwTitle').textContent=c.t;
  document.getElementById('dwDesc').textContent=c.d;
  const meta=document.getElementById('dwMeta'); meta.innerHTML='';
  if(c.v){ meta.innerHTML += '<span class="m"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 4 6v6c0 5 3.5 8 8 10 4.5-2 8-5 8-10V6Z"/></svg>Versao <b>'+c.v+'</b></span>'; }
  const foot=document.getElementById('dwFoot');
  if(rec.st==='noar') foot.textContent='No ar em producao. Faz parte do portal hoje.';
  else if(rec.st==='cheg') foot.textContent='Em finalizacao. Chega junto do lancamento de segunda.';
  else if(rec.st==='apr') foot.textContent='Pronto do nosso lado, aguardando uma aprovacao externa.';
  else if(rec.st==='plan') foot.textContent='Planejado. Clareza do que vem, sem promessa de data.';
  else foot.textContent='Descartado. Registrado por honestidade, fora do escopo atual.';
  drawer.classList.add('open'); drawer.setAttribute('aria-hidden','false');
  scrim.classList.add('on');
}
function closeDetail(){
  drawer.classList.remove('open'); drawer.setAttribute('aria-hidden','true'); scrim.classList.remove('on');
  if(selRec){ selRec.el.classList.remove('sel'); selRec=null; }
}
document.getElementById('dwClose').addEventListener('click',closeDetail);
scrim.addEventListener('click',closeDetail);
document.addEventListener('keydown',(e)=>{ if(e.key==='Escape') closeDetail(); });

/* ============================================================
   PAN / ZOOM
   ============================================================ */
const stage=document.getElementById('stage');
let scale=1, tx=0, ty=0;
function apply(){ world.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`; }
function clampScale(s){ return Math.min(2.2, Math.max(0.28, s)); }

function fit(){
  // bounding box de todos os nos
  let minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;
  const pad=140;
  const pts=[[CX,CY]];
  AREAS.forEach(a=>{ pts.push([a._x,a._y]); a._leaves.forEach(r=>pts.push([r.x,r.y])); });
  pts.forEach(([x,y])=>{ minX=Math.min(minX,x-pad); minY=Math.min(minY,y-pad); maxX=Math.max(maxX,x+pad); maxY=Math.max(maxY,y+pad); });
  const bw=maxX-minX, bh=maxY-minY;
  const rc=stage.getBoundingClientRect();
  scale=clampScale(Math.min(rc.width/bw, rc.height/bh));
  tx=(rc.width - bw*scale)/2 - minX*scale;
  ty=(rc.height - bh*scale)/2 - minY*scale;
  apply();
}
function zoomAt(cx,cy,factor){
  const ns=clampScale(scale*factor);
  const k=ns/scale;
  tx = cx - (cx-tx)*k;
  ty = cy - (cy-ty)*k;
  scale=ns; apply();
}
stage.addEventListener('wheel',(e)=>{
  e.preventDefault();
  const rc=stage.getBoundingClientRect();
  zoomAt(e.clientX-rc.left, e.clientY-rc.top, e.deltaY<0?1.12:0.89);
},{passive:false});

let dragging=false, moved=false, sx=0, sy=0, otx=0, oty=0;
stage.addEventListener('pointerdown',(e)=>{
  if(e.target.closest('.leaf,.area,.core,.drawer,.dock,.expand-all,.legend,.chip,.search')) return;
  dragging=true; moved=false; sx=e.clientX; sy=e.clientY; otx=tx; oty=ty;
  stage.classList.add('grabbing'); stage.setPointerCapture(e.pointerId);
});
stage.addEventListener('pointermove',(e)=>{
  if(!dragging) return;
  const dx=e.clientX-sx, dy=e.clientY-sy;
  if(Math.abs(dx)+Math.abs(dy)>4) moved=true;
  tx=otx+dx; ty=oty+dy; apply();
});
stage.addEventListener('pointerup',(e)=>{ dragging=false; stage.classList.remove('grabbing'); });
stage.addEventListener('pointercancel',()=>{ dragging=false; stage.classList.remove('grabbing'); });

const rc=stage.getBoundingClientRect();
document.getElementById('zoomIn').addEventListener('click',()=>{ const r=stage.getBoundingClientRect(); zoomAt(r.width/2,r.height/2,1.18); });
document.getElementById('zoomOut').addEventListener('click',()=>{ const r=stage.getBoundingClientRect(); zoomAt(r.width/2,r.height/2,0.85); });
document.getElementById('fit').addEventListener('click',fit);

document.getElementById('expandAll').addEventListener('click',()=>{
  const allOpen = AREAS.every(a=>a._open);
  AREAS.forEach(a=>setArea(a,!allOpen)); syncExpandBtn();
  setTimeout(fit,60); dismissHint();
});

/* ============================================================
   TEMA
   ============================================================ */
function setTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  const dark=t==='dark';
  document.getElementById('themeIc').innerHTML = dark
    ? '<path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z"/>'
    : '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>';
  try{ localStorage.setItem('fiopulse:brain:tema',t);}catch(e){}
}
document.getElementById('themeBtn').addEventListener('click',()=>{
  setTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');
});

/* ============================================================
   CONTADORES + HINT
   ============================================================ */
function counters(){
  const c={noar:0,cheg:0,apr:0,plan:0,desc:0}; let tot=0;
  AREAS.forEach(a=>a.children.forEach(ch=>{ c[ch.st]++; tot++; }));
  document.getElementById('cTot').textContent=tot;
  document.getElementById('cNoar').textContent=c.noar;
  document.getElementById('cCheg').textContent=c.cheg;
  document.getElementById('cApr').textContent=c.apr;
  document.getElementById('cPlan').textContent=c.plan;
  document.getElementById('cDesc').textContent=c.desc;
}
let hintGone=false;
function dismissHint(){ if(hintGone) return; hintGone=true; document.getElementById('hint').classList.add('gone'); }

/* ============================================================
   INIT
   ============================================================ */
(function init(){
  let t='light';
  try{ t=localStorage.getItem('fiopulse:brain:tema') || (matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light'); }
  catch(e){ if(matchMedia('(prefers-color-scheme: dark)').matches) t='dark'; }
  setTheme(t);
  buildLayout();
  counters();
  AREAS.forEach(a=>setArea(a,true));   // nasce aberto: celebracao do que existe
  syncExpandBtn();
  applyFilter();
  requestAnimationFrame(()=>{ fit(); });
  setTimeout(dismissHint, 9000);
})();
</script>
