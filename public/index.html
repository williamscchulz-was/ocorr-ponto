<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#008835" />
  <title>FioPulse · Fiobras</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="icon" type="image/png" sizes="48x48" href="favicon-48.png" />
  <link rel="icon" type="image/png" sizes="96x96" href="favicon-96.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="styles.css?v=120" />
  <!-- Decide ANTES de renderizar: se "manter conectado" estava ligado, há
       sessão pra restaurar → mostra o splash "Entrando…" em vez do login
       (que só some quando o Firebase confirma). Zero flash do formulário. -->
  <script>
    try {
      if (localStorage.getItem("fiopulse:manterConectado") === "1") {
        document.documentElement.classList.add("sessao-restaurando");
      }
    } catch (e) {}
  </script>
</head>
<body>

  <!-- Splash de restauração de sessão (visível só com .sessao-restaurando) -->
  <div id="splash" class="splash">
    <div class="splash__inner">
      <img class="splash__logo" src="logo-fiobras-mark.png" alt="" />
      <div class="splash__name">FioPulse<small>Fiobras · o batimento do RH</small></div>
      <div class="splash__spin" aria-hidden="true"></div>
      <div class="splash__status" role="status">Entrando…</div>
    </div>
  </div>

  <!-- ============================================
       LOGIN SCREEN
       ============================================ -->
  <section id="login" class="login">
    <form class="login__form" id="login-form" autocomplete="off">
      <div class="login__mark">
        <img class="login__mark-img" src="logo-fiobras-mark.png" alt="Fiobras" />
        <div class="login__wordmark">
          FioPulse
          <small>Fiobras · o batimento do RH</small>
        </div>
      </div>

      <p class="lead">Escolha um usuário rápido para testar o sistema:</p>
      <div class="login__quick" id="login-quick"></div>
      <div class="login__divider">ou entre manualmente</div>

      <div class="field">
        <label for="login-user">Usuário</label>
        <input type="text" id="login-user" placeholder="ex: rh1" />
      </div>
      <div class="field">
        <label for="login-pass">Senha</label>
        <div class="field-senha">
          <input type="password" id="login-pass" placeholder="senha do usuário" />
          <button type="button" class="field-senha__olho" id="toggle-senha" aria-label="Mostrar senha" title="Mostrar senha">
            <svg class="icon icon-olho" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="icon icon-olho-off hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>

      <div id="login-error" class="field__error hidden" style="margin-bottom:12px"></div>

      <label class="login__remember" for="login-remember">
        <input type="checkbox" id="login-remember" />
        <span>Manter conectado neste navegador</span>
      </label>

      <button type="submit" class="btn btn--primary btn--block btn--lg">Entrar</button>

      <div class="login__forgot">
        <button type="button" id="btn-forgot">Esqueci minha senha</button>
      </div>
    </form>
    <div class="login__rodape">© 2026 Fiobras · acesso restrito</div>
  </section>


  <!-- ============================================
       APP SHELL
       ============================================ -->
  <div id="app" class="app hidden">
    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

    <aside class="app__sidebar" id="sidebar">
      <button class="sidebar-toggle" id="sidebar-toggle" title="Recolher/expandir menu" aria-label="Recolher ou expandir menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="app__brand">
        <div class="app__brand-mark has-logo">
          <img src="logo-fiobras-mark-white.png" alt="Fiobras" />
        </div>
        <div class="app__brand-text">
          FioPulse<span class="brand-pulse" aria-hidden="true"></span>
          <small>Fiobras · o batimento do RH</small>
        </div>
      </div>

      <nav class="nav" id="nav"></nav>

      <!-- Bloco fixo no rodapé: presença online + usuário logado -->
      <div class="app__bottom">
        <div class="sidebar-presence" id="sidebar-presence"></div>

        <button class="app__user" id="user-area" title="Perfil e sessão" style="cursor:pointer; text-align:left; width:100%;">
          <div class="avatar" id="user-avatar">--</div>
          <div class="app__user-info">
            <strong id="user-name">--</strong>
            <span id="user-role">--</span>
          </div>
          <span class="app__user-logout" aria-hidden="true">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/>
            </svg>
          </span>
        </button>
      </div>
    </aside>

    <main class="app__main">
      <div class="topbar">
        <button class="topbar__menu" id="menu-btn">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <div class="topbar__title" id="topbar-title">Ocorrências</div>
        <div class="presence" id="presence" title="Quem está online agora"></div>
      </div>

      <div id="view"></div>
    </main>

    <button class="fab" id="fab" title="Nova ocorrência">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </button>

    <!-- Chat flutuante (FAB + painel estilo WhatsApp) -->
    <button class="chat-fab" id="chat-fab" title="Mensagens" aria-label="Abrir mensagens">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
      <span class="chat-fab__badge" id="chat-fab-badge" hidden></span>
    </button>
    <div class="chat-widget" id="chat-widget" hidden>
      <div class="chat-widget__head">
        <strong>Mensagens</strong>
        <button class="chat-widget__close" id="chat-widget-close" aria-label="Fechar">&times;</button>
      </div>
      <div class="chat-widget__body">
        <div class="chat__contatos" id="chat-contatos"></div>
        <section class="chat__thread" id="chat-thread"></section>
      </div>
    </div>

    <nav class="bottom-nav" id="bottom-nav" aria-label="Navegação principal"></nav>
  </div>

  <div class="demo-banner" title="Modo demo — dados em localStorage. Configure Firebase para usar em produção.">Modo demo</div>

  <div id="modal-root"></div>
  <div class="toast-root" id="toast-root" aria-live="polite" aria-atomic="false"></div>

  <script defer src="data.js?v=120"></script>
  <script defer src="app.js?v=120"></script>
  <!-- firebase.config.js é gitignored: criar localmente (veja firebase.config.example.js).
       O onerror engole o 404 quando o arquivo não existe (modo demo).
       defer preserva ordem entre scripts deferred. -->
  <script defer src="firebase.config.js" onerror="void 0"></script>
  <script defer src="firebase.js?v=120"></script>
  <script defer src="google-drive.js?v=120"></script>
</body>
</html>
