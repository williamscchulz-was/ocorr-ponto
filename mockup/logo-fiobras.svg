<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 64" aria-label="Fiobras">
  <!-- Ícone: cone de fios estilizado, três curvas nas cores da marca -->
  <g transform="translate(2, 6)">
    <!-- Curva azul (base/onda) -->
    <path d="M 4 32 Q 22 16 44 22 Q 50 24 52 26"
          fill="none" stroke="#0076BE" stroke-width="6"
          stroke-linecap="round" />
    <!-- Curva verde (arco superior, simbolizando o fio) -->
    <path d="M 14 30 Q 30 4 56 8 Q 60 9 60 12"
          fill="none" stroke="#008835" stroke-width="6"
          stroke-linecap="round" />
    <!-- Detalhe amarelo (arco inferior, cone) -->
    <path d="M 18 44 Q 36 50 56 42"
          fill="none" stroke="#FFCB00" stroke-width="4"
          stroke-linecap="round" />
  </g>
  <!-- Letreiro "Fiobras" -->
  <text x="74" y="42" font-family="'Poppins', 'Inter Tight', system-ui, sans-serif"
        font-weight="800" font-style="italic" font-size="32"
        fill="#008835" letter-spacing="-0.5">Fiobras</text>
</svg>
